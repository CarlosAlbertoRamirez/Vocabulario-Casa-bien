<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulario del Hogar | Your Mexican Friend</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --cyan:#25d9ff;--cyan2:#00bfff;--magenta:#ff2bbf;--magenta2:#ff4fd8;
  --bg1:#070019;--bg2:#160033;--text:#f0f0ff;--muted:#a8abce;--muted2:#5a5d8a;
  --good:#22c55e;--bad:#ef4444;--warn:#f59e0b;
  --font:'DM Sans',system-ui,sans-serif;--display:'Syne',system-ui,sans-serif;
  --shadow:0 20px 40px rgba(0,0,0,.4),0 0 28px rgba(255,43,191,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:radial-gradient(ellipse at 10% 10%,rgba(255,43,191,.13),transparent 28%),radial-gradient(ellipse at 90% 15%,rgba(37,217,255,.09),transparent 28%),linear-gradient(155deg,var(--bg1),var(--bg2));color:var(--text);min-height:100vh}
.app{width:min(980px,96%);margin:14px auto 40px;display:flex;flex-direction:column;gap:12px}
.hero{border-radius:22px;padding:22px 26px;background:linear-gradient(130deg,#0a0022,#1c0050 55%,#0c002e);border:1px solid rgba(255,255,255,.09);box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:38px 38px;pointer-events:none}
.hero-in{position:relative;z-index:1;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo-box{width:64px;height:64px;flex-shrink:0;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,#0c0030,#280060);border:2px solid rgba(37,217,255,.28);box-shadow:0 0 18px rgba(255,43,191,.22);font-family:var(--display);font-size:1rem;font-weight:900;color:var(--magenta);text-shadow:1px 1px 0 var(--cyan)}
.hero-text h1{font-family:var(--display);font-size:clamp(1.5rem,2.8vw,2.4rem);font-weight:900;line-height:.95;background:linear-gradient(90deg,#fff 25%,var(--cyan) 65%,var(--magenta) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-text p{color:var(--muted);font-size:.86rem;line-height:1.5;margin-top:4px}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.badge{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:999px;padding:3px 10px;font-size:.7rem;font-weight:700;color:var(--muted)}
.badge.c{border-color:rgba(37,217,255,.3);color:var(--cyan)}
.badge.m{border-color:rgba(255,43,191,.3);color:var(--magenta2)}
.room-tabs{display:flex;gap:6px;overflow-x:auto;padding:10px;background:linear-gradient(180deg,rgba(18,4,42,.97),rgba(24,10,52,.97));border:1px solid rgba(37,217,255,.13);border-radius:18px;box-shadow:var(--shadow);scrollbar-width:none}
.room-tabs::-webkit-scrollbar{display:none}
.rtab{flex-shrink:0;border:0;border-radius:11px;padding:9px 14px;font-weight:800;font-family:var(--font);font-size:.82rem;cursor:default;color:var(--muted2);background:transparent;display:flex;align-items:center;gap:6px;transition:.18s}
.rtab.done{color:var(--good);background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2)}
.rtab.active{color:white;box-shadow:0 3px 0 rgba(0,0,0,.2);transform:translateY(-1px)}
.rtab .rt-dot{width:7px;height:7px;border-radius:50%;background:rgba(34,197,94,.7);display:none}
.rtab.done .rt-dot{display:block}
.panel{background:linear-gradient(180deg,rgba(18,4,42,.97),rgba(24,10,52,.97));border:1px solid rgba(37,217,255,.13);border-radius:20px;padding:26px 28px;box-shadow:var(--shadow)}
.room-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.rh-left{display:flex;align-items:center;gap:14px}
.rh-icon{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;font-size:1.6rem;flex-shrink:0;border:1px solid rgba(255,255,255,.08)}
.rh-title{font-family:var(--display);font-size:1.4rem;font-weight:900}
.rh-sub{font-size:.83rem;color:var(--muted);margin-top:2px}
.score-pills{display:flex;gap:8px;align-items:center}
.sc-pill{background:rgba(255,255,255,.06);border:1px solid rgba(37,217,255,.13);border-radius:999px;padding:5px 13px;font-size:.78rem;font-weight:700}
.sc-pill .v{font-family:var(--display);font-size:1rem}
.sc-pill .v.g{color:var(--good)}.sc-pill .v.b{color:var(--bad)}
.prog-wrap{margin-bottom:20px}
.prog-lbl{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);margin-bottom:5px;display:flex;justify-content:space-between}
.prog-track{height:6px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),var(--magenta));transition:width .4s}
.fb-bar{height:38px;display:flex;align-items:center;gap:8px;font-size:.88rem;font-weight:600;margin-bottom:18px;padding:0 14px;border-radius:10px;transition:.2s}
.fb-bar.ok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:#86efac}
.fb-bar.err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.fb-bar.idle{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:var(--muted2)}
.columns{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.col-head{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);margin-bottom:10px;padding-left:4px}
.card-list{display:flex;flex-direction:column;gap:8px}
/* IMAGE CARD */
.img-card{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;cursor:pointer;transition:border-color .18s,transform .18s,background .18s;position:relative}
.img-card:hover{border-color:rgba(37,217,255,.4);transform:translateY(-2px)}
.img-card.selected{border-color:var(--cyan);background:rgba(37,217,255,.08);box-shadow:0 0 0 3px rgba(37,217,255,.15)}
.img-card.matched{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.07);cursor:default;transform:none}
.img-card.wrong{border-color:var(--bad);animation:shk .32s ease}
.img-card.matched::after{content:'✓';position:absolute;top:8px;right:10px;font-size:1rem;color:var(--good);font-weight:900}
.img-inner{display:flex;align-items:center;height:80px}
/* the image/icon slot */
.img-slot{width:100px;height:80px;flex-shrink:0;overflow:hidden;position:relative;background:#0d0030}
.img-slot img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s}
.img-slot .icon-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.img-slot .icon-fallback svg{opacity:.9}
.img-slot .loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.spinner{width:22px;height:22px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.img-label{padding:0 14px;flex:1}
.img-label .word{font-family:var(--display);font-size:1rem;font-weight:800;color:var(--text)}
.img-label .phonetic{font-size:.72rem;color:var(--muted2);margin-top:2px}
/* DESC CARD */
.desc-card{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:14px;padding:13px 16px;cursor:pointer;transition:border-color .18s,transform .18s,background .18s;display:flex;align-items:center;gap:10px;min-height:80px}
.desc-card:hover{border-color:rgba(255,43,191,.4);transform:translateY(-2px)}
.desc-card.selected{border-color:var(--magenta);background:rgba(255,43,191,.08);box-shadow:0 0 0 3px rgba(255,43,191,.12)}
.desc-card.matched{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.07);cursor:default;transform:none;opacity:.8}
.desc-card.wrong{border-color:var(--bad);animation:shk .32s ease}
.desc-num{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;color:var(--muted2);flex-shrink:0}
.desc-text{font-size:.9rem;color:var(--muted);line-height:1.45;flex:1}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.actions{display:flex;justify-content:flex-end;margin-top:20px;gap:10px;align-items:center}
.hint-count{font-size:.75rem;color:var(--muted2);font-weight:700}
.btn{border:0;border-radius:11px;padding:10px 20px;font-weight:800;font-family:var(--font);font-size:.85rem;cursor:pointer;transition:.16s;box-shadow:0 3px 0 rgba(0,0,0,.2)}
.btn:hover{transform:translateY(-2px)}.btn:active{transform:translateY(0);box-shadow:none}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#07111f}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--muted);border:1px solid rgba(255,255,255,.1)}
.end-screen{text-align:center;padding:40px 20px}
.end-trophy{font-size:4rem;margin-bottom:16px}
.end-title{font-family:var(--display);font-size:2rem;font-weight:900;background:linear-gradient(90deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.end-score{font-family:var(--display);font-size:3.5rem;font-weight:900;color:var(--cyan);margin:12px 0 4px}
.end-msg{color:var(--muted);font-size:.95rem;line-height:1.7;max-width:420px;margin:0 auto 24px}
.end-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
.end-stat{background:rgba(255,255,255,.05);border:1px solid rgba(37,217,255,.13);border-radius:14px;padding:12px 20px;text-align:center}
.end-stat .es-l{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2)}
.end-stat .es-v{font-family:var(--display);font-size:1.6rem;font-weight:900;color:var(--cyan)}
.end-stat .es-v.g{color:var(--good)}.end-stat .es-v.b{color:var(--bad)}
.stars{font-size:2rem;margin-bottom:8px}
.creator{text-align:center;color:#4a4d78;font-size:.76rem;font-weight:700;margin-top:2px}
.creator span{color:var(--magenta2)}
@media(max-width:640px){.columns{grid-template-columns:1fr}.panel{padding:18px 14px}.img-slot{width:76px;height:64px}.img-inner{height:64px}}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-in">
    <div class="logo-box">YMF</div>
    <div class="hero-text">
      <h1>Vocabulario del Hogar</h1>
      <p>Une cada imagen con su descripción. Recorre todos los cuartos de la casa y aprende el vocabulario esencial en español.</p>
      <div class="badges">
        <span class="badge c">Nivel A1–A2</span>
        <span class="badge m">Vocabulario</span>
        <span class="badge">Relacionar imágenes</span>
        <span class="badge">By Carlos &amp; Denisse</span>
      </div>
    </div>
  </div>
</header>
<div class="room-tabs" id="roomTabs"></div>
<div class="panel" id="mainPanel"></div>
<p class="creator">By <span>Carlos &amp; Denisse</span> · Your Mexican Friend</p>
</div>

/* ══════════════════════════════════════════════════════
   THUMBNAIL CACHE — wikipedia REST API
══════════════════════════════════════════════════════ */
const thumbCache = {};

async function fetchThumb(slug) {
  if (thumbCache[slug] !== undefined) return thumbCache[slug];
  thumbCache[slug] = null; // mark as fetching
  try {
    const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${slug}`, {
      headers: { 'Accept': 'application/json' }
    });
    const d = await r.json();
    const url = d.thumbnail ? d.thumbnail.source : null;
    thumbCache[slug] = url;
    return url;
  } catch(e) {
    thumbCache[slug] = null;
    return null;
  }
}

// Preload all thumbs for a room
async function preloadRoom(room) {
  await Promise.all(room.items.map(item => fetchThumb(item.wiki)));
}

// Apply loaded image to a slot already in the DOM
function applyThumb(slug, roomColor, roomBg, itemWord, imgEl, loaderEl, iconEl) {
  const url = thumbCache[slug];
  if (url) {
    imgEl.src = url;
    imgEl.style.opacity = '0';
    imgEl.onload = () => { loaderEl.style.display='none'; imgEl.style.opacity='1'; };
    imgEl.onerror = () => { loaderEl.style.display='none'; imgEl.style.display='none'; iconEl.style.display='flex'; };
  } else {
    loaderEl.style.display = 'none';
    iconEl.style.display = 'flex';
  }
}

/* ══════════════════════════════════════════════════════
   GAME STATE
══════════════════════════════════════════════════════ */
let roomIdx=0, matched=new Set(), selectedLeft=null, selectedRight=null;
let correctCount=0, wrongCount=0, totalCorrectAll=0, totalWrongAll=0;
let doneRooms=new Set(), leftOrder=[], rightOrder=[], hintsLeft=2;

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ══════════════════════════════════════════════════════
   RENDER TABS
══════════════════════════════════════════════════════ */
function renderTabs(){
  document.getElementById('roomTabs').innerHTML = ROOMS.map((r,i)=>{
    const isDone=doneRooms.has(i), isActive=i===roomIdx;
    let cls='rtab'+(isDone?' done':'')+(isActive?' active':'');
    const style=isActive?`background:linear-gradient(135deg,${r.color}cc,${r.color}88);border:1px solid ${r.color}55;`:'';
    return `<div class="${cls}" style="${style}">${r.icon} ${r.name}${isDone?'<span class="rt-dot"></span>':''}</div>`;
  }).join('');
}

/* ══════════════════════════════════════════════════════
   RENDER ROOM
══════════════════════════════════════════════════════ */
async function startRoom(idx){
  roomIdx=idx; matched=new Set(); selectedLeft=null; selectedRight=null;
  correctCount=0; wrongCount=0; hintsLeft=2;
  const room=ROOMS[idx];
  leftOrder=shuffle(room.items.map((_,i)=>i));
  rightOrder=shuffle(room.items.map((_,i)=>i));
  renderTabs();
  renderRoom();
  // preload in background, then patch images into DOM
  await preloadRoom(room);
  room.items.forEach((item,i)=>{
    const imgEl   = document.getElementById(`img_L${i}`);
    const loaderEl= document.getElementById(`loader_L${i}`);
    const iconEl  = document.getElementById(`icon_L${i}`);
    if(imgEl) applyThumb(item.wiki, room.color, room.bg, item.word, imgEl, loaderEl, iconEl);
  });
}

function renderRoom(){
  const room=ROOMS[roomIdx];
  const pct=Math.round((matched.size/room.items.length)*100);
  document.getElementById('mainPanel').innerHTML=`
    <div class="room-header">
      <div class="rh-left">
        <div class="rh-icon" style="background:${room.bg};border-color:${room.color}44">${room.icon}</div>
        <div>
          <div class="rh-title" style="color:${room.color}">${room.name}</div>
          <div class="rh-sub">Relaciona cada imagen con su descripción</div>
        </div>
      </div>
      <div class="score-pills">
        <div class="sc-pill">✓ <span class="v g">${matched.size}</span>/${room.items.length}</div>
        <div class="sc-pill">✗ <span class="v b">${wrongCount}</span></div>
      </div>
    </div>
    <div class="prog-wrap">
      <div class="prog-lbl"><span>Progreso</span><span>${pct}%</span></div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:${pct}%"></div></div>
    </div>
    <div class="fb-bar idle" id="fbBar">↑ Toca una imagen y luego su descripción para relacionarlas</div>
    <div class="columns">
      <div>
        <div class="col-head">🖼 Imagen</div>
        <div class="card-list">${leftOrder.map(i=>renderImgCard(room,i)).join('')}</div>
      </div>
      <div>
        <div class="col-head">📝 ¿Qué es?</div>
        <div class="card-list">${rightOrder.map((i,pos)=>renderDescCard(room,i,pos)).join('')}</div>
      </div>
    </div>
    <div class="actions">
      <span class="hint-count" id="hintCount">💡 Pistas: ${hintsLeft}</span>
      <button class="btn btn-ghost" id="hintBtn" onclick="useHint()" ${hintsLeft===0?'disabled':''}>Pista</button>
      <button class="btn btn-cyan" id="nextBtn" onclick="goNext()" ${matched.size<room.items.length?'disabled':''}>
        ${roomIdx<ROOMS.length-1?'Siguiente cuarto →':'Ver resultados 🏁'}
      </button>
    </div>`;
}

function iconSVG(word, color) {
  const paths = ICONS[word] || '';
  return `<svg viewBox="0 0 64 64" width="54" height="54" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
}

function renderImgCard(room, i){
  const item=room.items[i];
  const isMatched=matched.has(i), isSel=selectedLeft===i;
  let cls='img-card'+(isMatched?' matched':isSel?' selected':'');
  // Show spinner while loading; icon-fallback hidden initially
  return `<div class="${cls}" id="L${i}" onclick="clickLeft(${i})">
    <div class="img-inner">
      <div class="img-slot">
        <div class="loader" id="loader_L${i}"><div class="spinner"></div></div>
        <img id="img_L${i}" alt="${item.word}" style="opacity:0;width:100%;height:100%;object-fit:cover;display:block">
        <div class="icon-fallback" id="icon_L${i}" style="display:none;background:${room.bg}">
          ${iconSVG(item.word, room.color)}
        </div>
      </div>
      <div class="img-label">
        <div class="word">${item.word}</div>
        <div class="phonetic">${item.phonetic}</div>
      </div>
    </div>
  </div>`;
}

function renderDescCard(room, i, pos){
  const item=room.items[i];
  const isMatched=matched.has(i), isSel=selectedRight===i;
  let cls='desc-card'+(isMatched?' matched':isSel?' selected':'');
  return `<div class="${cls}" id="R${i}" onclick="clickRight(${i})">
    <div class="desc-num">${pos+1}</div>
    <div class="desc-text">${item.desc}</div>
  </div>`;
}

/* ══════════════════════════════════════════════════════
   INTERACTION
══════════════════════════════════════════════════════ */
function clickLeft(i){ if(matched.has(i))return; selectedLeft=i; refreshCards(); if(selectedRight!==null)tryMatch(); }
function clickRight(i){ if(matched.has(i))return; selectedRight=i; refreshCards(); if(selectedLeft!==null)tryMatch(); }

function refreshCards(){
  ROOMS[roomIdx].items.forEach((_,i)=>{
    const l=document.getElementById('L'+i), r=document.getElementById('R'+i);
    if(l&&!matched.has(i)) l.className='img-card'+(selectedLeft===i?' selected':'');
    if(r&&!matched.has(i)) r.className='desc-card'+(selectedRight===i?' selected':'');
  });
}

function tryMatch(){
  const l=selectedLeft, r=selectedRight;
  selectedLeft=null; selectedRight=null;
  if(l===r){
    matched.add(l); correctCount++; totalCorrectAll++;
    const lEl=document.getElementById('L'+l), rEl=document.getElementById('R'+l);
    if(lEl) lEl.className='img-card matched';
    if(rEl) rEl.className='desc-card matched';
    const pf=document.getElementById('progFill');
    if(pf) pf.style.width=Math.round((matched.size/ROOMS[roomIdx].items.length)*100)+'%';
    const sc=document.querySelector('.sc-pill .v.g'); if(sc) sc.textContent=matched.size;
    setFb('ok',`✓ ¡Correcto! <strong>${ROOMS[roomIdx].items[l].word}</strong> — ${ROOMS[roomIdx].items[l].desc.split('.')[0]}.`);
    if(matched.size===ROOMS[roomIdx].items.length){
      const nb=document.getElementById('nextBtn'); if(nb) nb.disabled=false;
      setTimeout(()=>setFb('ok',`🎉 ¡Completaste ${ROOMS[roomIdx].name}! Haz clic para continuar.`),800);
    }
  } else {
    wrongCount++; totalWrongAll++;
    const sc=document.querySelector('.sc-pill .v.b'); if(sc) sc.textContent=wrongCount;
    const lEl=document.getElementById('L'+l), rEl=document.getElementById('R'+r);
    if(lEl){lEl.className='img-card wrong';setTimeout(()=>{if(lEl&&!matched.has(l))lEl.className='img-card';},380);}
    if(rEl){rEl.className='desc-card wrong';setTimeout(()=>{if(rEl&&!matched.has(r))rEl.className='desc-card';},380);}
    setFb('err','✗ No es ese par. Fíjate bien en la descripción e intenta de nuevo.');
  }
}

function setFb(type, html){
  const fb=document.getElementById('fbBar'); if(!fb)return;
  fb.className='fb-bar '+type; fb.innerHTML=html;
  if(type==='ok'&&matched.size<ROOMS[roomIdx].items.length)
    setTimeout(()=>{if(fb&&matched.size<ROOMS[roomIdx].items.length)fb.innerHTML='↑ Sigue relacionando…';},2000);
}

function useHint(){
  if(hintsLeft<=0)return;
  const room=ROOMS[roomIdx];
  const unmatched=room.items.map((_,i)=>i).filter(i=>!matched.has(i));
  if(!unmatched.length)return;
  const target=unmatched[0]; hintsLeft--;
  const lEl=document.getElementById('L'+target), rEl=document.getElementById('R'+target);
  if(lEl){lEl.style.boxShadow='0 0 0 4px '+room.color;setTimeout(()=>{if(lEl)lEl.style.boxShadow='';},1800);}
  if(rEl){rEl.style.boxShadow='0 0 0 4px '+room.color;setTimeout(()=>{if(rEl)rEl.style.boxShadow='';},1800);}
  setFb('ok',`💡 Pista: <strong>${room.items[target].word}</strong> corresponde a la descripción que brilla.`);
  const hc=document.getElementById('hintCount'); if(hc) hc.textContent='💡 Pistas: '+hintsLeft;
  if(hintsLeft===0){const hb=document.getElementById('hintBtn');if(hb)hb.disabled=true;}
}

function goNext(){
  doneRooms.add(roomIdx);
  if(roomIdx<ROOMS.length-1){ startRoom(roomIdx+1); } else { showEnd(); }
}

function showEnd(){
  renderTabs();
  const total=ROOMS.reduce((s,r)=>s+r.items.length,0);
  const pct=Math.round((totalCorrectAll/total)*100);
  const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  const trophy=pct>=90?'🏆':pct>=70?'🎉':'💪';
  const msg=pct>=90?'¡Excelente! Conoces muy bien el vocabulario del hogar.':
    pct>=70?'¡Muy bien! Tienes una base sólida. Repasa los cuartos con más errores.':
    pct>=50?'Buen intento. Vuelve a jugar y notarás la mejora.':
    '¡No te rindas! Intenta de nuevo. ¡Puedes mejorar!';
  document.getElementById('mainPanel').innerHTML=`
    <div class="end-screen">
      <div class="end-trophy">${trophy}</div>
      <div class="end-title">¡Terminaste el recorrido!</div>
      <div class="stars">${stars}</div>
      <div class="end-score">${pct}%</div>
      <div class="end-msg">${msg}</div>
      <div class="end-stats">
        <div class="end-stat"><div class="es-l">Cuartos</div><div class="es-v">${ROOMS.length}</div></div>
        <div class="end-stat"><div class="es-l">Correctas</div><div class="es-v g">${totalCorrectAll}</div></div>
        <div class="end-stat"><div class="es-l">Errores</div><div class="es-v b">${totalWrongAll}</div></div>
        <div class="end-stat"><div class="es-l">Total pares</div><div class="es-v">${total}</div></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-cyan" onclick="restartGame()">↺ Jugar de nuevo</button>
        <button class="btn btn-ghost" onclick="startRoom(0)">Repasar desde la cocina</button>
      </div>
    </div>`;
}

function restartGame(){ totalCorrectAll=0; totalWrongAll=0; doneRooms=new Set(); startRoom(0); }

/* INIT */
startRoom(0);
